<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>狼人杀 · 12人神局 · AI Agent 自动对战</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="bg-stars"></div>
<div class="bg-moon"></div>
<div class="bg-sun"></div>
<div class="bg-fog"></div>

<header class="topbar">
  <div class="title">
    <span class="logo">🐺</span>
    <h1>狼人杀 · 12人神局</h1>
    <span class="sub">AI Agent · Auto Battle</span>
  </div>
  <div class="controls">
    <div class="phase-pill" id="phasePill">
      <span class="phase-icon" id="phaseIcon">🌙</span>
      <span class="phase-text" id="phaseText">准备开始</span>
      <span class="phase-day" id="phaseDay">第 0 天</span>
    </div>
    <button id="btnStart" class="btn primary" disabled title="正在连接 LLM…">🎬 开始游戏</button>
    <button id="btnPause" class="btn">⏸ 暂停</button>
    <button id="btnReset" class="btn ghost">↻ 重开</button>
    <label class="speed">
      速度
      <select id="speedSel">
        <option value="5000">极慢</option>
        <option value="3500" selected>慢</option>
        <option value="2000">中</option>
        <option value="1000">快</option>
        <option value="400">极速</option>
      </select>
    </label>
    <label class="speed">
      LLM
      <select id="providerSel">
        <option value="bedrock" selected>Bedrock (Sonnet 4.6)</option>
        <option value="deepseek">DeepSeek V4 Pro</option>
        <option value="claude">Claude API (Sonnet 4.6)</option>
        <option value="openai">OpenAI (GPT-5.4-mini)</option>
      </select>
    </label>
    <label class="speed">
      <input type="checkbox" id="revealRoles" /> 上帝视角
    </label>
    <label class="speed">
      <input type="checkbox" id="ttsToggle" /> 朗读
    </label>
  </div>
</header>

<main class="stage">
  <section class="table-wrap">
    <div class="vote-banner" id="voteBanner"></div>
    <div class="center" id="centerHud">
      <div class="center-ring">
        <div class="center-emoji" id="centerEmoji">🌙</div>
        <div class="center-day" id="centerDay">第 0 天</div>
        <div class="center-status" id="centerStatus">正在连接 LLM…</div>
        <div class="alive-counter" id="aliveCounter">
          <span class="ac-good"><i></i><b id="aliveGood">8</b> 好人</span>
          <span class="ac-bad"><i></i><b id="aliveBad">4</b> 狼人</span>
        </div>
      </div>
      <div class="rays" id="rays"></div>
    </div>
    <div class="seats" id="seats"></div>
    <svg class="fx-layer" id="fxLayer"></svg>
    <div class="bubble-layer" id="bubbleLayer"></div>
  </section>

  <aside class="sidebar">
    <div class="panel role-panel">
      <h3>👁 局势面板</h3>
      <div class="roles-grid">
        <div class="role-card"><span class="dot wolf"></span>狼人 <b>4</b></div>
        <div class="role-card"><span class="dot seer"></span>预言家 <b>1</b></div>
        <div class="role-card"><span class="dot witch"></span>女巫 <b>1</b></div>
        <div class="role-card"><span class="dot hunter"></span>猎人 <b>1</b></div>
        <div class="role-card"><span class="dot guard"></span>守卫 <b>1</b></div>
        <div class="role-card"><span class="dot villager"></span>村民 <b>4</b></div>
      </div>
    </div>

    <div class="panel log-panel">
      <h3>📜 实况日志</h3>
      <div class="log" id="log"></div>
    </div>

    <div class="panel speech-panel">
      <h3>🎤 最新发言</h3>
      <div class="speech" id="latestSpeech">—— 等待开局 ——</div>
    </div>
  </aside>
</main>

<div class="result-overlay hidden" id="resultOverlay">
  <div class="result-card">
    <div class="result-emoji" id="resultEmoji">🏆</div>
    <h2 id="resultTitle">游戏结束</h2>
    <p id="resultSubtitle"></p>
    <div class="result-roles" id="resultRoles"></div>
    <button class="btn primary" id="btnPlayAgain">再来一局</button>
  </div>
</div>

<script src="agents.js"></script>
<script src="llm-adapter.example.js"></script>
<script src="game.js"></script>
<script>
  // 启用 local 路由（走本机 llm-proxy.js）
  if (window.LLM_AGENT) window.LLM_AGENT.use("local");

  // 当前选用的 LLM provider（由 select 控制，proxy 端按此 dispatch）
  window.CURRENT_PROVIDER = "bedrock";

  const providerSel = document.getElementById("providerSel");
  providerSel.addEventListener("change", e => {
    window.CURRENT_PROVIDER = e.target.value;
    console.log("[ui] switched to provider:", e.target.value);
  });

  // 按钮 + 状态机：未连上 LLM 时锁定开始按钮
  const btnStart    = document.getElementById("btnStart");
  const centerStat  = document.getElementById("centerStatus");
  function setStartLocked(locked, reason) {
    // 游戏运行中不强制解锁（startNewGame 会设置 data-game-running="1"）
    if (btnStart.dataset.gameRunning === "1") return;
    btnStart.disabled = locked;
    btnStart.title = locked ? reason : "";
    if (centerStat) centerStat.textContent = locked ? `⚠ ${reason}` : "";
  }

  // V2.10：Electron 模式 port 由 preload 注入；浏览器默认 3001
  const PROXY_PORT = (window.electron && window.electron.proxyPort) || 3001;
  const PROXY_BASE = `http://127.0.0.1:${PROXY_PORT}`;

  // 拉 /config 探测 llm-proxy 是否在 + 哪些 provider 已配
  function probeProxy() {
    return fetch(`${PROXY_BASE}/config`, { cache: "no-store" })
      .then(r => r.json())
      .then(cfg => {
        const available = new Set(cfg.availableProviders || []);
        let firstAvail = null;
        Array.from(providerSel.options).forEach(opt => {
          // 重置 label（轮询时避免重复追加 "(未配置)"）
          opt.textContent = opt.textContent.replace(/\s*\(未配置\)$/, "");
          if (!available.has(opt.value)) {
            opt.disabled = true;
            opt.textContent += " (未配置)";
          } else {
            opt.disabled = false;
            if (firstAvail === null) firstAvail = opt.value;
          }
        });
        if (!available.has(window.CURRENT_PROVIDER) && firstAvail) {
          providerSel.value = firstAvail;
          window.CURRENT_PROVIDER = firstAvail;
        }
        if (available.size === 0) {
          setStartLocked(true, "请在 config.json 中配置至少一个 LLM provider");
        } else {
          setStartLocked(false);
        }
      })
      .catch(err => {
        // proxy 没起 / 网络问题
        Array.from(providerSel.options).forEach(opt => { opt.disabled = true; });
        setStartLocked(true, "请先运行 node llm-proxy.js（端口 3001）");
        console.warn("[ui] cannot reach llm-proxy at :3001:", err.message);
      });
  }
  // 暴露给 game.js 在游戏结束时调用，重新评估按钮状态
  window.probeProxy = probeProxy;

  probeProxy();
  // 每 3 秒重探一次，便于用户后启动 llm-proxy 时自动解锁按钮
  setInterval(probeProxy, 3000);
</script>
</body>
</html>
